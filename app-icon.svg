<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#134E4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded rectangle with gradient -->
  <rect x="0" y="0" width="256" height="256" rx="72" ry="72" fill="url(#grad1)"/>
  
  <!-- Decorative circle -->
  <circle cx="64" cy="51" r="170" fill="white" opacity="0.12"/>
  
  <!-- Main book shape - white background -->
  <rect x="66" y="46" width="123" height="148" rx="20" ry="20" fill="white"/>
  
  <!-- Book spine - teal accent -->
  <rect x="66" y="46" width="37" height="148" rx="10" ry="10" fill="#CCFBF1"/>
  
  <!-- Book pages - lines -->
  <line x1="92" y1="60" x2="172" y2="60" stroke="#0F766E" stroke-width="7" opacity="0.85"/>
  <line x1="92" y1="103" x2="172" y2="103" stroke="#0F766E" stroke-width="7" opacity="0.85"/>
  <line x1="92" y1="146" x2="147" y2="146" stroke="#0F766E" stroke-width="7" opacity="0.85"/>
  
  <!-- Bottom accent bar -->
  <rect x="77" y="190" width="103" height="20" rx="8" ry="8" fill="#99F6E4"/>
</svg>
