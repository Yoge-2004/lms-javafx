name: Build Linux Installers

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'dist/**'          # avoid re-triggering when we commit the built installers
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fakeroot rpm binutils

      - name: Build fat JAR + .deb + .rpm
        # -Dinstaller activates the installer-linux profile (see pom.xml)
        # which runs jpackage-deb and jpackage-rpm during the install phase
        run: mvn install -B -DskipTests -Dinstaller

      - name: Copy installers to dist/
        run: |
          mkdir -p dist
          find target/installer -name "*.deb" -o -name "*.rpm" | while read f; do
            cp "$f" dist/
            echo "Copied: $(basename $f)  $(du -sh $f | cut -f1)"
          done

      - name: Commit updated dist/ back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet && echo "No installer changes." || \
            git commit -m "chore: rebuild Linux installers [skip ci]" && git push
