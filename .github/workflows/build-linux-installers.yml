name: Build Linux Installers

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'dist/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven

      - name: Install Linux packaging tools
        run: sudo apt-get update -qq && sudo apt-get install -y fakeroot rpm binutils

      - name: Build fat JAR + .deb + .rpm
        run: |
          set -o pipefail
          mvn install -B -DskipTests -Dinstaller 2>&1 | tee /tmp/build.log

      - name: Annotate build errors
        if: failure()
        run: |
          echo "### Maven Build Output (last 60 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -60 /tmp/build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "ERROR|error:" /tmp/build.log | head -20 | while IFS= read -r line; do
            echo "::error::$line"
          done

      - name: Copy installers to dist/
        run: |
          mkdir -p dist
          find target/installer -name "*.deb" -o -name "*.rpm" | while read f; do
            cp "$f" dist/
            echo "Copied: $(basename $f)  ($(du -sh $f | cut -f1))"
          done
          ls -lh dist/

      - name: Commit updated dist/ back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet \
            && echo "No installer changes to commit." \
            || (git commit -m "chore: rebuild Linux installers [skip ci]" && git push)
